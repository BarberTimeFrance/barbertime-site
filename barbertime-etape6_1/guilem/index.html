<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Guilem Cuevas Gonzalez — Barbertime</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Cormorant+Garamond:ital@1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c8912a;--gold-l:#e0b968;--red:#b31217;--ink:#0c0b0a}
html,body{min-height:100%}
body{background:radial-gradient(130% 120% at 50% 15%,#1a1613 0%,#0c0b0a 68%);color:#f5f1ea;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:32px 20px calc(32px + env(safe-area-inset-bottom))}
.wrap{width:100%;max-width:400px;text-align:center;animation:in .6s cubic-bezier(.19,1,.22,1)}
@keyframes in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.logo{width:min(72vw,300px);margin:0 auto 26px;filter:drop-shadow(0 6px 20px rgba(0,0,0,.5))}
.name{font-family:'Oswald',sans-serif;font-weight:600;font-size:26px;letter-spacing:.05em;text-transform:uppercase;line-height:1.1}
.role{font-family:'Oswald',sans-serif;font-weight:400;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-l);margin-top:8px}
.sep{width:46px;height:2px;background:var(--red);margin:22px auto 26px;border-radius:2px}
.btns{display:flex;flex-direction:column;gap:12px}
.btn{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:15px 18px;text-decoration:none;color:#f5f1ea;transition:all .16s;text-align:left}
.btn:hover{background:rgba(255,255,255,.08);transform:translateY(-2px);border-color:rgba(200,145,42,.4)}
.btn .ico{width:42px;height:42px;flex:none;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center}
.btn .ico svg{width:22px;height:22px;fill:var(--ink)}
.btn .tx{flex:1;min-width:0}
.btn .tx b{display:block;font-family:'Oswald',sans-serif;font-weight:500;font-size:15px;letter-spacing:.03em;text-transform:uppercase}
.btn .tx span{font-size:12px;color:#b7ac9c;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.btn .chev{color:var(--gold-l);font-size:20px}
.foot{margin-top:28px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:#8a8175}
</style>
</head>
